name: Noon Egypt Scraper

on:
  schedule:
    - cron: '0 2 * * *'   # 4:00 AM Egypt time (UTC+2)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

jobs:
  # ── 27 parallel jobs — one category group each ───────────────────────────
  scrape:
    name: Scrape Group ${{ matrix.group_index }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        group_index: [0,1,2]   # TEST: 3 groups only — expand to all 27 after test passes
      fail-fast: false
      max-parallel: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Stagger start
        run: sleep $((RANDOM % 60 + 30))

      - name: Start virtual display (Xvfb) so browser appears headed
        run: |
          sudo apt-get install -y xvfb > /dev/null 2>&1
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run spider (Group ${{ matrix.group_index }})
        env:
          DISPLAY: :99
        run: python noon_spider.py --group_index ${{ matrix.group_index }} --limit 50

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: products-${{ matrix.group_index }}
          path: products_${{ matrix.group_index }}.json

  # ── Merge all groups → CSV → download ────────────────────────────────────
  export:
    name: Merge & Export CSV
    runs-on: ubuntu-latest
    needs: scrape
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: products-*
          merge-multiple: true

      - name: Merge JSON -> CSV
        run: |
          python - <<'EOF'
          import json, glob, csv

          merged = []
          for fname in sorted(glob.glob("products_*.json")):
              with open(fname, encoding="utf-8") as f:
                  try:
                      data = json.load(f)
                      merged.extend(data)
                      print(f"{fname}: {len(data)} products")
                  except Exception as e:
                      print(f"{fname}: ERROR - {e}")

          print(f"\nTotal: {len(merged)} products")

          columns = [
              "platform", "sku", "title", "brand", "category",
              "current_price", "original_price", "discount",
              "rating", "reviews_count", "availability",
              "seller", "noon_express",
              "main_image", "all_images", "product_url", "scraped_at",
          ]

          with open("noon_products.csv", "w", encoding="utf-8-sig", newline="") as f:
              writer = csv.DictWriter(f, fieldnames=columns, extrasaction="ignore")
              writer.writeheader()
              for item in merged:
                  item["all_images"] = " | ".join(item.get("all_images", []))
                  writer.writerow(item)

          print("CSV saved: noon_products.csv")
          EOF

      - name: Upload CSV for download
        uses: actions/upload-artifact@v4
        with:
          name: noon-products-csv
          path: noon_products.csv
          retention-days: 30

      - name: Summary
        run: |
          COUNT=$(python -c "import csv; r=list(csv.DictReader(open('noon_products.csv',encoding='utf-8-sig'))); print(len(r))")
          echo "## Noon Scraping Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total products scraped:** $COUNT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### How to download the CSV" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to the **Actions** tab in this repository" >> $GITHUB_STEP_SUMMARY
          echo "2. Click on this workflow run" >> $GITHUB_STEP_SUMMARY
          echo "3. Scroll down to **Artifacts**" >> $GITHUB_STEP_SUMMARY
          echo "4. Click **noon-products-csv** to download" >> $GITHUB_STEP_SUMMARY
